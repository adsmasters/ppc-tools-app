<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neues Passwort - AdsMasters PPC Tools</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', Arial, sans-serif; background: #fcf9f8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .wrap { width: 100%; max-width: 440px; padding: 24px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo img { height: 32px; width: auto; }
        .logo-sub { font-size: 0.82rem; color: #6b7280; margin-top: 4px; }
        .card { background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 4px 32px rgba(53,81,255,0.08); }
        .card-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 6px; color: #111; }
        .card-sub { font-size: 0.82rem; color: #6b7280; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.82rem; font-weight: 700; color: #374151; margin-bottom: 6px; }
        input { width: 100%; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 0.92rem; color: #111; outline: none; transition: border-color 0.2s; background: #fff; }
        input:focus { border-color: #3452FF; }
        .btn { width: 100%; padding: 13px; background: #3452FF; color: #fff; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 6px; transition: filter 0.2s; }
        .btn:hover { filter: brightness(1.1); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; filter: none; }
        .msg { padding: 11px 14px; border-radius: 8px; font-size: 0.83rem; margin-bottom: 14px; display: none; }
        .msg.error { background: #fee2e2; border: 1px solid #fca5a5; color: #dc2626; display: block; }
        .msg.success { background: #dcfce7; border: 1px solid #86efac; color: #16a34a; display: block; }
        .invalid { text-align: center; padding: 40px 20px; }
        .invalid-icon { font-size: 48px; margin-bottom: 16px; }
        .invalid p { color: #6b7280; font-size: 0.9rem; margin-bottom: 20px; }
        .link { color: #3452FF; font-weight: 600; text-decoration: none; font-size: 0.9rem; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="wrap">
    <div class="logo">
        <img src="logo.png" alt="AdsMasters">
        <div class="logo-sub">PPC Tools</div>
    </div>
    <div class="card" id="card">
        <div id="loading" style="text-align:center;padding:20px;color:#6b7280;font-size:0.9rem;">Wird geladen...</div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const { createClient } = window.supabase;
const sb = createClient(
    'https://moxvqkisroonmdinmjat.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1veHZxa2lzcm9vbm1kaW5tamF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjcwMjQsImV4cCI6MjA5MDM0MzAyNH0.MuTqA684d3H3ZUrnxOcVQpU10NVa9Pdgb0tviV-kf04'
);

async function init() {
    const card = document.getElementById('card');

    // Supabase puts the token in the URL hash: #access_token=...&type=recovery
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const type = params.get('type');
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');

    // Also check query string (some Supabase versions use ?token_hash=)
    const qp = new URLSearchParams(window.location.search);
    const tokenHash = qp.get('token_hash');
    const qType = qp.get('type');

    let isRecovery = type === 'recovery' || qType === 'recovery';

    if (!isRecovery && !tokenHash) {
        card.innerHTML = `
            <div class="invalid">
                <div class="invalid-icon">⚠️</div>
                <p>Dieser Link ist ungültig oder abgelaufen.<br>Bitte fordere einen neuen Passwort-Reset-Link an.</p>
                <a href="login.html" class="link">Zurück zum Login</a>
            </div>`;
        return;
    }

    // Set session from token hash if present (new Supabase behavior)
    if (tokenHash) {
        const { error } = await sb.auth.verifyOtp({ token_hash: tokenHash, type: 'recovery' });
        if (error) {
            card.innerHTML = `
                <div class="invalid">
                    <div class="invalid-icon">⚠️</div>
                    <p>Dieser Link ist ungültig oder abgelaufen.<br>Bitte fordere einen neuen Passwort-Reset-Link an.</p>
                    <a href="login.html" class="link">Zurück zum Login</a>
                </div>`;
            return;
        }
    } else if (accessToken && refreshToken) {
        await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
    }

    // Show the new password form
    card.innerHTML = `
        <div class="card-title">Neues Passwort setzen</div>
        <div class="card-sub">Wähle ein sicheres Passwort mit mindestens 8 Zeichen.</div>
        <div id="msg" class="msg"></div>
        <div class="form-group">
            <label>Neues Passwort</label>
            <input type="password" id="new-pass" placeholder="Mindestens 8 Zeichen" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>Passwort bestätigen</label>
            <input type="password" id="new-pass2" placeholder="Passwort wiederholen" autocomplete="new-password">
        </div>
        <button class="btn" id="save-btn" onclick="savePassword()">Passwort speichern</button>
    `;
}

async function savePassword() {
    const pass = document.getElementById('new-pass').value;
    const pass2 = document.getElementById('new-pass2').value;
    const msg = document.getElementById('msg');
    const btn = document.getElementById('save-btn');

    if (pass.length < 8) {
        msg.textContent = 'Passwort muss mindestens 8 Zeichen lang sein.';
        msg.className = 'msg error';
        return;
    }
    if (pass !== pass2) {
        msg.textContent = 'Die Passwörter stimmen nicht überein.';
        msg.className = 'msg error';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Wird gespeichert...';

    const { error } = await sb.auth.updateUser({ password: pass });
    if (error) {
        msg.textContent = 'Fehler: ' + error.message;
        msg.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Passwort speichern';
        return;
    }

    msg.textContent = 'Passwort erfolgreich gesetzt! Du wirst weitergeleitet...';
    msg.className = 'msg success';
    setTimeout(() => { location.href = 'login.html'; }, 2000);
}

document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('save-btn')) savePassword();
});

init();
</script>
    <div style="text-align:center;padding:24px 0 32px;font-size:12px;color:#9ca3af;">
        <a href="agb.html" style="color:#9ca3af;text-decoration:none;margin:0 10px;">AGB</a>
        <a href="datenschutz.html" style="color:#9ca3af;text-decoration:none;margin:0 10px;">Datenschutz</a>
        <a href="impressum.html" style="color:#9ca3af;text-decoration:none;margin:0 10px;">Impressum</a>
    </div>
</body>
</html>
