<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden - AdsMasters PPC Tools</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', Arial, sans-serif; background: #fcf9f8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .wrap { width: 100%; max-width: 440px; padding: 24px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo img { height: 32px; width: auto; margin-bottom: 8px; }
        .logo-sub { font-size: 0.82rem; color: #6b7280; margin-top: 4px; }
        .card { background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 4px 32px rgba(53,81,255,0.08); }
        .tabs { display: flex; border-bottom: 2px solid #e5e7eb; margin-bottom: 28px; }
        .tab { flex: 1; padding: 12px; text-align: center; font-weight: 600; font-size: 0.9rem; color: #9ca3af; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .tab.active { color: #3452FF; border-bottom-color: #3452FF; }
        .panel { display: none; }
        .panel.active { display: block; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.82rem; font-weight: 700; color: #374151; margin-bottom: 6px; }
        input { width: 100%; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 0.92rem; color: #111; outline: none; transition: border-color 0.2s; background: #fff; }
        input:focus { border-color: #3452FF; }
        .btn { width: 100%; padding: 13px; background: #3452FF; color: #fff; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 6px; transition: filter 0.2s; }
        .btn:hover { filter: brightness(1.1); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; filter: none; }
        .msg { padding: 11px 14px; border-radius: 8px; font-size: 0.83rem; margin-bottom: 14px; display: none; }
        .msg.error { background: #fee2e2; border: 1px solid #fca5a5; color: #dc2626; }
        .msg.success { background: #dcfce7; border: 1px solid #86efac; color: #16a34a; }
        .link-btn { width: 100%; padding: 10px; background: none; border: none; color: #3452FF; font-size: 0.82rem; cursor: pointer; margin-top: 8px; text-decoration: underline; }
        .back-btn { width: 100%; padding: 10px; background: none; border: none; color: #9ca3af; font-size: 0.82rem; cursor: pointer; margin-top: 8px; }
        @media (max-width: 768px) {
            .wrap { padding: 16px; }
            .card { padding: 24px; border-radius: 14px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="wrap">
    <div class="logo">
        <img src="logo.png" alt="AdsMasters">
        <div class="logo-sub">PPC Tools</div>
    </div>
    <div class="card">
        <div class="tabs">
            <div class="tab active" data-tab="login">Anmelden</div>
            <div class="tab" data-tab="register">Registrieren</div>
        </div>
        <div id="msg" class="msg"></div>
        <div class="panel active" id="panel-login">
            <div class="form-group"><label>E-Mail</label><input type="email" id="l-email" placeholder="deine@email.de" autocomplete="email"></div>
            <div class="form-group"><label>Passwort</label><input type="password" id="l-pass" placeholder="Passwort" autocomplete="current-password"></div>
            <button class="btn" id="login-btn">Anmelden</button>
            <button type="button" class="link-btn" id="forgot-btn">Passwort vergessen?</button>
        </div>
        <div class="panel" id="panel-reset">
            <div class="form-group"><label>E-Mail-Adresse</label><input type="email" id="reset-email" placeholder="deine@email.de" autocomplete="email"></div>
            <button class="btn" id="reset-btn">Link zum Zurücksetzen senden</button>
            <button type="button" class="back-btn" id="back-to-login">Zurück zum Login</button>
        </div>
        <div class="panel" id="panel-register">
            <div class="form-group"><label>Firmenname</label><input type="text" id="r-company" placeholder="Muster GmbH"></div>
            <div class="form-group"><label>E-Mail</label><input type="email" id="r-email" placeholder="deine@email.de"></div>
            <div class="form-group"><label>Passwort (min. 8 Zeichen)</label><input type="password" id="r-pass" placeholder="Passwort"></div>
            <div class="form-group"><label>Passwort bestätigen</label><input type="password" id="r-pass2" placeholder="Passwort wiederholen"></div>
            <button class="btn" id="reg-btn">Konto erstellen</button>
            <div id="resend-section" style="display:none;margin-top:16px;text-align:center;">
                <p style="font-size:0.8rem;color:#6b7280;margin-bottom:8px;">Keine E-Mail erhalten? Bitte auch den <strong>Spam-Ordner</strong> prüfen.</p>
                <button type="button" class="link-btn" id="resend-btn" style="margin-top:0;">Bestätigungsmail erneut senden</button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const { createClient } = window.supabase;
const sb = createClient('https://moxvqkisroonmdinmjat.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1veHZxa2lzcm9vbm1kaW5tamF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjcwMjQsImV4cCI6MjA5MDM0MzAyNH0.MuTqA684d3H3ZUrnxOcVQpU10NVa9Pdgb0tviV-kf04');

// If already logged in with active subscription → dashboard
// If no subscription → stay on login page (avoid pricing↔login loop)
sb.auth.getSession().then(async ({ data: { session } }) => {
    if (!session) return;
    const { data: sub } = await sb.from('ppc_subscriptions').select('status').eq('user_id', session.user.id).single();
    if (sub && sub.status === 'active') {
        location.href = 'dashboard.html';
    }
    // No active sub: stay on login page, user needs to re-login or go to pricing manually
});

// Tabs
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    hideMsg();
}));

function showMsg(text, type) { const el = document.getElementById('msg'); el.textContent = text; el.className = 'msg ' + type; el.style.display = 'block'; }
function hideMsg() { document.getElementById('msg').style.display = 'none'; }

// Login
document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('l-email').value.trim();
    const pass = document.getElementById('l-pass').value;
    if (!email || !pass) { showMsg('Bitte alle Felder ausfüllen', 'error'); return; }
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Anmelden...';
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { showMsg('Fehler: ' + error.message, 'error'); btn.disabled = false; btn.textContent = 'Anmelden'; return; }
    // Check if user has active subscription
    const { data: { user } } = await sb.auth.getUser();
    const { data: sub } = await sb.from('ppc_subscriptions').select('status').eq('user_id', user.id).single();
    if (sub && sub.status === 'active') {
        location.href = 'dashboard.html';
    } else {
        location.href = 'pricing.html';
    }
});

// Register
let lastRegisteredEmail = '';
document.getElementById('reg-btn').addEventListener('click', async () => {
    const company = document.getElementById('r-company').value.trim();
    const email = document.getElementById('r-email').value.trim();
    const pass = document.getElementById('r-pass').value;
    const pass2 = document.getElementById('r-pass2').value;
    if (!company || !email || !pass || !pass2) { showMsg('Bitte alle Felder ausfüllen.', 'error'); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showMsg('Bitte eine gültige E-Mail-Adresse eingeben.', 'error'); return; }
    if (pass.length < 8) { showMsg('Passwort muss mind. 8 Zeichen lang sein.', 'error'); return; }
    if (pass !== pass2) { showMsg('Die Passwörter stimmen nicht überein.', 'error'); return; }
    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'Erstelle Konto...';
    const { data, error } = await sb.auth.signUp({
        email,
        password: pass,
        options: {
            data: { company_name: company },
            emailRedirectTo: location.origin + '/ppc-tools-app/login.html'
        }
    });
    if (error) {
        let msg = 'Fehler: ' + error.message;
        if (error.message.includes('rate limit') || error.message.includes('429')) {
            msg = 'Zu viele Registrierungen in kurzer Zeit. Bitte warte 1 Stunde und versuche es erneut.';
        } else if (error.message.toLowerCase().includes('already registered') || error.message.toLowerCase().includes('already been registered') || error.message.toLowerCase().includes('user already')) {
            msg = 'Diese E-Mail-Adresse ist bereits registriert. Bitte melde dich über den Login-Tab an oder setze dein Passwort zurück.';
        }
        showMsg(msg, 'error'); btn.disabled = false; btn.textContent = 'Konto erstellen'; return;
    }
    if (data.user) {
        try { await sb.from('ppc_profiles').upsert({ user_id: data.user.id, company_name: company }); } catch(e) {}
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            location.href = 'pricing.html';
            return;
        }
    }
    lastRegisteredEmail = email;
    showMsg('Konto erstellt! Bitte bestätige deine E-Mail-Adresse. Tipp: Auch den Spam-Ordner prüfen.', 'success');
    document.getElementById('resend-section').style.display = 'block';
    btn.disabled = false; btn.textContent = 'Konto erstellen';
});

// Resend confirmation email
document.getElementById('resend-btn').addEventListener('click', async () => {
    const email = lastRegisteredEmail || document.getElementById('r-email').value.trim();
    if (!email) { showMsg('Bitte zuerst registrieren.', 'error'); return; }
    const btn = document.getElementById('resend-btn');
    btn.disabled = true; btn.textContent = 'Wird gesendet...';
    const { error } = await sb.auth.resend({ type: 'signup', email });
    if (error) { showMsg('Fehler beim Senden: ' + error.message, 'error'); }
    else { showMsg('Bestätigungsmail wurde erneut an ' + email + ' gesendet. Bitte auch den Spam-Ordner prüfen.', 'success'); }
    btn.disabled = false; btn.textContent = 'Bestätigungsmail erneut senden';
});

// Forgot password
document.getElementById('forgot-btn').addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    document.getElementById('panel-reset').classList.add('active');
    hideMsg();
    const e = document.getElementById('l-email').value.trim();
    if (e) document.getElementById('reset-email').value = e;
});

document.getElementById('back-to-login').addEventListener('click', () => {
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    document.getElementById('panel-login').classList.add('active');
    document.querySelector('[data-tab="login"]').classList.add('active');
    hideMsg();
});

document.getElementById('reset-btn').addEventListener('click', async () => {
    const email = document.getElementById('reset-email').value.trim();
    if (!email) { showMsg('Bitte E-Mail-Adresse eingeben', 'error'); return; }
    const btn = document.getElementById('reset-btn');
    btn.disabled = true; btn.textContent = 'Wird gesendet...';
    const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: location.origin + '/ppc-tools-app/reset-password.html'
    });
    if (error) { showMsg('Fehler: ' + error.message, 'error'); }
    else { showMsg('Link zum Zurücksetzen wurde an ' + email + ' gesendet.', 'success'); }
    btn.disabled = false; btn.textContent = 'Link zum Zurücksetzen senden';
});

// Enter key
document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const active = document.querySelector('.panel.active');
    if (active.id === 'panel-login') document.getElementById('login-btn').click();
    else if (active.id === 'panel-register') document.getElementById('reg-btn').click();
    else document.getElementById('reset-btn').click();
});

// Handle email confirmation redirect (Supabase puts type=signup in hash)
(async () => {
    const hash = new URLSearchParams(window.location.hash.substring(1));
    const qp = new URLSearchParams(window.location.search);
    if (hash.get('type') === 'signup' || qp.get('type') === 'signup') {
        // Email successfully confirmed → auto-login happened, check session
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            const { data: sub } = await sb.from('ppc_subscriptions').select('status').eq('user_id', session.user.id).single();
            if (sub && sub.status === 'active') { location.href = 'dashboard.html'; return; }
            location.href = 'pricing.html'; return;
        }
        showMsg('E-Mail-Adresse bestätigt! Bitte melde dich jetzt an.', 'success');
    }
    if (hash.get('type') === 'recovery' || qp.get('type') === 'recovery') {
        location.href = 'reset-password.html' + window.location.hash + window.location.search;
    }
})();

// Check URL params for tab pre-selection
const params = new URLSearchParams(location.search);
if (params.get('plan') || params.get('mode') === 'register') {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    document.querySelector('[data-tab="register"]').classList.add('active');
    document.getElementById('panel-register').classList.add('active');
}
</script>
    <div style="text-align:center;padding:24px 0 40px;font-size:12px;color:#9ca3af;">
        <a href="agb.html" style="color:#9ca3af;text-decoration:none;margin:0 10px;">AGB</a>
        <a href="datenschutz.html" style="color:#9ca3af;text-decoration:none;margin:0 10px;">Datenschutz</a>
        <a href="impressum.html" style="color:#9ca3af;text-decoration:none;margin:0 10px;">Impressum</a>
    </div>
</body>
</html>
